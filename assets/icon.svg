  <circle cx="445" cy="480" r="55" fill="#ffffff"/>

  <!-- Mercury level -->
  <rect x="428" y="250" width="34" height="195" rx="8" fill="#000000"/>
  <circle cx="445" cy="480" r="42" fill="#000000"/>

  <!-- Temperature marks -->
  <rect x="484" y="165" width="30" height="5" rx="2" fill="#000000" opacity="0.5"/>
  <rect x="484" y="225" width="30" height="5" rx="2" fill="#000000" opacity="0.5"/>
  <rect x="484" y="285" width="30" height="5" rx="2" fill="#000000" opacity="0.5"/>
  <rect x="484" y="345" width="30" height="5" rx="2" fill="#000000" opacity="0.5"/>
</svg>
