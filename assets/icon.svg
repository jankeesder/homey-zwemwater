<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- Waves -->
  <path d="M100 560 Q200 490 300 540 T500 530 T700 540 T900 510" fill="none" stroke="#000000" stroke-width="38" stroke-linecap="round"/>
  <path d="M100 650 Q200 580 300 630 T500 620 T700 630 T900 600" fill="none" stroke="#000000" stroke-width="38" stroke-linecap="round" opacity="0.4"/>

  <!-- Thermometer body -->
  <rect x="410" y="120" width="70" height="330" rx="35" fill="#000000"/>
  <circle cx="445" cy="480" r="70" fill="#000000"/>

